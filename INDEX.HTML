<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio en construcción</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 700px;
      background: rgba(255,255,255,0.08);
      padding: 50px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1 {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.95;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 24px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }
    .social {
      margin-top: 20px;
      font-size: 0.95rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚧 Página en construcción</h1>
    <p>Estamos trabajando para lanzar nuestro nuevo sitio web muy pronto.</p>
    <p>Si necesitas contactarnos, escríbenos directamente.</p>
    <a class="btn" href="https://wa.me/56942212182" target="_blank">Contáctanos por WhatsApp</a>
    <div class="social">
      Instagram: @assistudio
      
    </div>
  </div>
</body>
</html>
